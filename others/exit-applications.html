<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出门申请列表</title>
    <script src="./statics/js/tailwindcss.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        @media (max-width: 640px) {
            html { -webkit-text-size-adjust: 100%; }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 p-3 sm:p-4 pb-[env(safe-area-inset-bottom)]">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-xl sm:text-2xl font-semibold text-gray-800 mb-4 sm:mb-6">出门申请列表</h1>

        <div id="search-wrap" class="hidden mb-4">
            <div class="relative">
                <input type="text" id="search-input" placeholder="搜索姓名" class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <div id="loading" class="flex justify-center py-12">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
        </div>

        <div id="error" class="hidden bg-red-50 text-red-700 p-3 sm:p-4 rounded-lg mb-4 sm:mb-6 text-sm sm:text-base"></div>

        <!-- 手机端：卡片布局 -->
        <div id="content-cards" class="hidden space-y-3 sm:hidden"></div>

        <!-- PC端：表格布局（手机端隐藏） -->
        <div id="content-table" class="hidden max-sm:hidden sm:block bg-white rounded-lg shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">学生姓名</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">事由</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">开始时间</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">结束时间</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>

        <div id="empty" class="hidden text-center py-12 text-gray-500 text-sm sm:text-base">暂无出门申请记录</div>
        <div id="no-match" class="hidden text-center py-12 text-gray-500 text-sm sm:text-base">未找到匹配的姓名</div>
    </div>

    <script>
        const API_URL = 'https://bhyone.com/api/site/exit_applications';

        let allRows = [];

        function renderCard(row) {
            const statusClass = row.status_name === '通过' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
            return `
                <div class="bg-white rounded-lg shadow p-4 border border-gray-100">
                    <div class="flex justify-between items-start gap-2 mb-2">
                        <span class="font-semibold text-blue-800 bg-blue-50 px-2 py-1 rounded">${escapeHtml(row.student_name || '-')}</span>
                        <span class="px-2 py-0.5 rounded text-xs shrink-0 ${statusClass}">${escapeHtml(row.status_name || '-')}</span>
                    </div>
                    <div class="mb-3">
                        <span class="text-xs text-gray-500">事由</span>
                        <p class="text-base sm:text-lg font-medium text-gray-800">${escapeHtml(row.note || '-')}</p>
                    </div>
                    <div class="space-y-1">
                        <div><span class="text-xs text-gray-500">开始时间</span><span class="block text-base sm:text-lg font-semibold text-gray-800">${escapeHtml(row.start_time || '-')}</span></div>
                        <div><span class="text-xs text-gray-500">结束时间</span><span class="block text-base sm:text-lg font-semibold text-gray-800">${escapeHtml(row.end_time || '-')}</span></div>
                    </div>
                </div>
            `;
        }

        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const contentCards = document.getElementById('content-cards');
            const contentTable = document.getElementById('content-table');
            const empty = document.getElementById('empty');
            const tbody = document.getElementById('tbody');

            try {
                const res = await fetch(API_URL);
                const json = await res.json();

                loading.classList.add('hidden');

                if (json.status !== 0) {
                    error.textContent = json.message || '加载失败';
                    error.classList.remove('hidden');
                    return;
                }

                allRows = json.data?.rows || [];

                if (allRows.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                document.getElementById('search-wrap').classList.remove('hidden');
                document.getElementById('search-input').addEventListener('input', renderFiltered);
                renderFiltered();
            } catch (e) {
                loading.classList.add('hidden');
                error.textContent = '网络错误：' + (e.message || '请稍后重试');
                error.classList.remove('hidden');
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderFiltered() {
            const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
            const rows = q ? allRows.filter(r => (r.student_name || '').toLowerCase().includes(q)) : allRows;
            const contentCards = document.getElementById('content-cards');
            const contentTable = document.getElementById('content-table');
            const empty = document.getElementById('empty');
            const noMatch = document.getElementById('no-match');
            const tbody = document.getElementById('tbody');

            empty.classList.add('hidden');
            noMatch.classList.add('hidden');

            if (rows.length === 0) {
                contentCards.classList.add('hidden');
                contentTable.classList.add('hidden');
                noMatch.classList.remove('hidden');
                return;
            }

            tbody.innerHTML = rows.map(row => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3"><span class="font-semibold text-blue-800 bg-blue-50 px-2 py-1 rounded">${escapeHtml(row.student_name || '-')}</span></td>
                    <td class="px-4 py-3 text-sm"><span class="px-2 py-1 rounded text-xs ${row.status_name === '通过' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">${escapeHtml(row.status_name || '-')}</span></td>
                    <td class="px-4 py-3 text-base font-medium text-gray-800">${escapeHtml(row.note || '-')}</td>
                    <td class="px-4 py-3 text-base font-semibold text-gray-800">${escapeHtml(row.start_time || '-')}</td>
                    <td class="px-4 py-3 text-base font-semibold text-gray-800">${escapeHtml(row.end_time || '-')}</td>
                </tr>
            `).join('');

            contentCards.innerHTML = rows.map(renderCard).join('');
            contentCards.classList.remove('hidden');
            contentTable.classList.remove('hidden');
        }

        loadData();
    </script>
</body>
</html>
